tickets_dir: ~/org/tickets

agents:
  claude:
    binary: claude

stages:
  code:
    prompt: Write code.
  review:
    prompt: Review code.

pipelines:
  default:
    - stage: code
      agent: claude
      on_success: next
      on_failure: pause
    - stage: review
      agent: claude
      on_success: next
      on_failure: pause
    - stage: code
      agent: claude
      on_success: done
      on_failure: pause
